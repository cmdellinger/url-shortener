<mat-card>
    <mat-card-header>
        <mat-card-title>Links</mat-card-title>
    </mat-card-header>
    @for (link of links(); track link.id) {
        <mat-card>
            <mat-card-header>
                @if (link.title) {
                    <mat-card-title>{{ link.title }}</mat-card-title>
                } @else {
                    <mat-card-title>{{ link.shortCode }}</mat-card-title>
                }
            </mat-card-header>
            <mat-card-content>
                short url: 
                <a [href]="apiUrl + '/' + link.shortCode"
                    target="_blank"
                    rel="noopener noreferrer">
                    {{ apiUrl }}/{{ link.shortCode }}
                </a>
                <br>
                original url: {{ link.originalUrl }}
                <br>
                click count: {{ link.clickCount }}
            </mat-card-content>
            <mat-card-actions>
                <button matButton (click)="onAnalytics(link.id)">analytics</button>
                <button matButton (click)="onDelete(link.id)">delete</button>
            </mat-card-actions>
        </mat-card>
    }
</mat-card>
